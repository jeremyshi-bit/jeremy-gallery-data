name: Import Blog Drafts

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import-blog-drafts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Discover blog URLs
        run: python scripts/discover_blog_urls.py

      - name: Import blog drafts from website
        run: python scripts/import_blog_from_website.py

      - name: Generate blog.json
        run: python scripts/generate_blog.py

      - name: Show generated files
        run: |
          echo "Generated imported posts:"
          ls -la posts/imported || true
          echo "Git status:"
          git status --short

      - name: Commit imported blog drafts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add discovered_blog_urls.json
          git add -A posts/imported discovered_blog_urls.json
          git add blog.json

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Import blog drafts from website"
            git push
          fi

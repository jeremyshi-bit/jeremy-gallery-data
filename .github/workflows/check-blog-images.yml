name: Check Blog Images

on:
  workflow_dispatch:

jobs:
  check-blog-images:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install beautifulsoup4

      - name: Audit all imported blog posts
        run: |
          python - <<'PY'
          import base64
          import re
          import urllib.request
          from pathlib import Path
          from urllib.parse import urlparse, unquote
          from bs4 import BeautifulSoup

          POSTS_DIR = Path("posts/imported")

          noise_patterns = [
              "BOOK A SESSION",
              "Latest Posts",
              "Next Post",
              "Follow me",
              "Please enable JavaScript",
              "Share",
              "Copied",
              "Tags:",
              "Item",
          ]

          def read_field(md, field):
              m = re.search(rf'^{field}:\s*(.+?)\s*$', md, re.M)
              if not m:
                  return ""
              return m.group(1).strip().strip('"').strip("'")

          def decode_pixpa_key(image_url):
              try:
                  path = urlparse(image_url).path.rstrip("/")
                  encoded = unquote(path.split("/")[-1])
                  padded = encoded + "=" * ((4 - len(encoded) % 4) % 4)
                  decoded = base64.urlsafe_b64decode(padded.encode("utf-8")).decode(
                      "utf-8",
                      errors="ignore",
                  )
                  return decoded
              except Exception:
                  return image_url

          def fetch_html(url):
              req = urllib.request.Request(
                  url,
                  headers={"User-Agent": "Mozilla/5.0 JeremyGalleryBot/1.0"},
              )
              return urllib.request.urlopen(req, timeout=30).read().decode(
                  "utf-8",
                  "ignore",
              )

          md_files = sorted(POSTS_DIR.glob("*.md"))

          print(f"Imported markdown files: {len(md_files)}")
          print("=" * 80)

          for md_path in md_files:
              md = md_path.read_text(encoding="utf-8")

              title = read_field(md, "title")
              source_url = read_field(md, "sourcePageUrl")
              md_image_count = md.count("![")

              noise_hits = []
              for pattern in noise_patterns:
                  if pattern in md:
                      noise_hits.append(pattern)

              print()
              print("=" * 80)
              print(f"FILE: {md_path}")
              print(f"TITLE: {title}")
              print(f"SOURCE: {source_url}")
              print(f"MARKDOWN IMAGE COUNT: {md_image_count}")

              if noise_hits:
                  print(f"NOISE FOUND: {', '.join(noise_hits)}")
              else:
                  print("NOISE FOUND: none")

              if not source_url:
                  print("HTML CHECK: skipped, no sourcePageUrl")
                  continue

              try:
                  html = fetch_html(source_url)
                  soup = BeautifulSoup(html, "html.parser")
                  imgs = soup.find_all("img")

                  print(f"HTML IMG TAG COUNT: {len(imgs)}")

                  unique_keys = []
                  seen = set()

                  for img in imgs:
                      src = (
                          img.get("src")
                          or img.get("data-src")
                          or img.get("data-original")
                          or img.get("data-lazy-src")
                      )

                      if not src:
                          continue

                      key = decode_pixpa_key(src)

                      if key in seen:
                          continue

                      seen.add(key)
                      unique_keys.append(key)

                  print(f"UNIQUE IMAGE KEY COUNT: {len(unique_keys)}")
                  print("UNIQUE IMAGE KEYS:")

                  for i, key in enumerate(unique_keys, 1):
                      print(f"  [{i}] {key}")

              except Exception as e:
                  print(f"HTML CHECK ERROR: {e}")

          print()
          print("=" * 80)
          print("Audit finished.")
          PY
